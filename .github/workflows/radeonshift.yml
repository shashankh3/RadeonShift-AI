name: RadeonShift CUDA Migration Audit
on:
  pull_request:
    paths:
      - '**.cu'
      - '**.cuh'

jobs:
  radeonshift-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Configuration
        id: check-config
        run: |
          if [ -z "${{ secrets.RADEONSHIFT_BACKEND_URL }}" ]; then
            echo "missing_url=true" >> $GITHUB_OUTPUT
            echo "::warning::RADEONSHIFT_BACKEND_URL is not configured. Skipping RadeonShift Audit."
            echo "### ⚠️ RadeonShift Audit Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Remote RadeonShift audit was skipped because \`RADEONSHIFT_BACKEND_URL\` is not configured." >> $GITHUB_STEP_SUMMARY
          else
            echo "missing_url=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Find CUDA files in PR
        if: steps.check-config.outputs.missing_url == 'false'
        id: find-cuda
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep -E '\.(cu|cuh)$' || true)
          # For testing, grab the first file
          FIRST_FILE=$(echo "$FILES" | head -n 1)
          echo "files=$FIRST_FILE" >> $GITHUB_OUTPUT
          
      - name: Send to RadeonShift Backend
        if: steps.check-config.outputs.missing_url == 'false' && steps.find-cuda.outputs.files != ''
        id: translate
        run: |
          # Read file content and escape it for JSON payload
          CONTENT=$(cat "${{ steps.find-cuda.outputs.files }}" | jq -sR .)
          PAYLOAD="{\"cuda_code\": $CONTENT}"
          
          RESPONSE=$(curl -s -X POST "${{ secrets.RADEONSHIFT_BACKEND_URL }}/translate" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          
      - name: Post PR Comment and Summary
        if: steps.check-config.outputs.missing_url == 'false' && steps.find-cuda.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const response = JSON.parse('${{ steps.translate.outputs.response }}');
            const auditLog = JSON.parse(response.audit_log);
            const verification = response.verification;
            const score = auditLog.readiness_score;
            const emoji = score >= 80 ? '🟢' : score >= 50 ? '🟡' : '🔴';
            
            const vStatus = verification ? verification.status : 'unknown';
            const vEmoji = vStatus === 'compile_verified' ? '✅' : vStatus === 'compile_blocked' ? '❌' : vStatus.includes('review') || vStatus.includes('warnings') ? '⚠️' : '⚪';
            
            const ptxRisks = auditLog.ptx_risks.length > 0 ? auditLog.ptx_risks.length : 0;
            const warpRisks = verification && verification.static_analysis ? verification.static_analysis.warp32_assumptions : 0;
            
            const body = `<!-- RadeonShiftAudit -->
            ## RadeonShift MI300X Migration Audit ${emoji}
            
            **Compilation Readiness Score:** ${score}/100
            
            ### Verification Gate ${vEmoji}
            - **Status:** \`${vStatus}\`
            - **Evidence ID:** \`${verification ? verification.evidence_id : 'N/A'}\`
            - **PTX Risks:** ${ptxRisks}
            - **Warp32 Assumptions:** ${warpRisks}
            
            _Note: No uploaded kernel was automatically executed. RadeonShift distinguishes static analysis, compile verification, and runtime benchmarking._
            
            ---
            _Automated by RadeonShift AI — Migration-as-a-Service for AMD MI300X_`;
            
            // Add job summary
            await core.summary
              .addHeading(`RadeonShift Audit: ${vStatus} ${vEmoji}`)
              .addRaw(body)
              .write();
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(c => c.body.includes('<!-- RadeonShiftAudit -->'));
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
            
            if (vStatus === 'compile_blocked') {
              core.setFailed("RadeonShift Verification Gate blocked compilation.");
            }
